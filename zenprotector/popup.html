<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenProtector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #999;
      margin-top: 1px;
    }

    .content {
      padding: 16px 20px;
    }

    .scan-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
    }

    .scan-btn:hover { opacity: 0.9; }
    .scan-btn:active { opacity: 0.75; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .clear-btn {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    .clear-btn:hover {
      border-color: #555;
      color: #aaa;
    }

    .results {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #222;
    }

    .score-display {
      text-align: center;
      margin-bottom: 10px;
    }

    .score-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .score-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .score-badge.positive {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .score-badge.negative {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .score-badge.neutral {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .score-value {
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .score-value.positive { color: #4ade80; }
    .score-value.negative { color: #f87171; }
    .score-value.neutral  { color: #94a3b8; }

    .meter {
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
    }

    /* centre tick mark */
    .meter::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      background: #444;
    }

    .meter-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .stat {
      flex: 1;
      background: #1a1a1a;
      border-radius: 7px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-num {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-num.neg     { color: #f87171; }
    .stat-num.pos     { color: #4ade80; }
    .stat-num.neutral { color: #94a3b8; }

    .stat-label {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .timestamp {
      font-size: 10px;
      color: #888;
      text-align: center;
      margin-top: 10px;
    }

    .auto-scan-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #222;
    }

    .auto-scan-label {
      font-size: 12px;
      color: #aaa;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: #22c55e;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Z</div>
    <div>
      <div class="title">ZenProtector</div>
      <div class="subtitle">Sentiment scanner</div>
    </div>
  </div>

  <div class="content">
    <button class="scan-btn" id="scanBtn">Scan Page</button>
    <button class="clear-btn" id="clearBtn">Clear Highlights</button>

    <div class="auto-scan-row">
      <span class="auto-scan-label">Auto-scan on page load</span>
      <label class="toggle">
        <input type="checkbox" id="autoScanToggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="results" id="results">
      <div class="score-display">
        <div class="score-label">Overall Sentiment</div>
        <div class="score-row">
          <span class="score-badge" id="scoreBadge"></span>
          <span class="score-value" id="scoreValue"></span>
        </div>
      </div>
      <div class="meter">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num neg" id="negCount">0</div>
          <div class="stat-label">Negative</div>
        </div>
        <div class="stat">
          <div class="stat-num pos" id="posCount">0</div>
          <div class="stat-label">Positive</div>
        </div>
        <div class="stat">
          <div class="stat-num neutral" id="totalCount">0</div>
          <div class="stat-label">Words</div>
        </div>
      </div>
      <div class="timestamp" id="scanTimestamp"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
